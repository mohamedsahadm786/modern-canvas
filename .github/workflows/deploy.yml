name: Deploy Frontend to S3 + CloudFront

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install
        working-directory: client

      - name: Build frontend
        run: npm run build
        working-directory: client

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ap-south-1

      # 🔒 HARD CHECK — S3 bucket
      - name: Verify S3 bucket secret
        run: |
          if [ -z "${{ secrets.S3_BUCKET_NAME }}" ]; then
            echo "❌ S3_BUCKET_NAME secret is missing or empty"
            exit 1
          fi
          echo "✅ Deploying to bucket: ${{ secrets.S3_BUCKET_NAME }}"

      # 🔒 HARD CHECK — CloudFront distribution
      - name: Verify CloudFront distribution secret
        run: |
          if [ -z "${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}" ]; then
            echo "❌ CLOUDFRONT_DISTRIBUTION_ID secret is missing or empty"
            exit 1
          fi
          echo "✅ CloudFront distribution: ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }}"

      - name: Upload to S3
        run: |
          aws s3 sync client/dist s3://${{ secrets.S3_BUCKET_NAME }} --delete

      - name: Invalidate CloudFront cache
        run: |
          aws cloudfront create-invalidation \
            --distribution-id ${{ secrets.CLOUDFRONT_DISTRIBUTION_ID }} \
            --paths "/*"
